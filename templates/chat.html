<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>

    <div style="margin-top: 20px;">
        <a href="/" style="text-decoration: none;">⬅ Back to Dashboard</a>
        <h2>Chatting with: <span style="color: #28a745;">{{ receiver.name }}</span></h2>
        <p style="margin-top: -10px; color: gray;">Their Expertise: {{ receiver.skill_offer }}</p>
    </div>

    <div style="border: 1px solid #ccc; padding: 15px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px;">
        
        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold; display: block; margin-bottom: 5px;">Your Name:</label>
            <input type="text" id="senderName" value="{{ sender.name }}" readonly style="width: 100%; padding: 8px; background-color: #f0f0f0; color: #555;">
        </div>

        <div id="private-messages" style="height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 15px; background: #fafafa; border-radius: 4px; display: flex; flex-direction: column; gap: 5px;"></div>
        
        <div style="display: flex; gap: 10px;">
            <input type="text" id="chatMessage" placeholder="Write a message..." style="flex-grow: 1; padding: 8px;">
            <button id="sendButton" style="background-color: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer;">Send</button>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

<script>
    const socket = io();

    // Read variables dynamically injected by the Python Flask route layout
    const senderId = "{{ sender.id }}";
    const receiverId = "{{ receiver.id }}";
    const senderName = "{{ sender.name }}";

    // Tell Python to join the private room as soon as this page loads
    socket.emit('join', { sender_id: senderId, receiver_id: receiverId });

    // When clicking the send button
    document.getElementById('send-btn').onclick = function() {
        const messageInput = document.getElementById('message-input');
        const msg = messageInput.value;
        
        if (msg.trim() !== "") {
            // Send message details over WebSocket to the Python server
            socket.emit('private_message', {
                sender_id: senderId,
                receiver_id: receiverId,
                sender_name: senderName,
                message: msg
            });
            messageInput.value = ''; // Clear the text input box
        }
    };

    // Listen for incoming messages broadcasted by the Python server
    socket.on('new_message', function(data) {
        const item = document.createElement('li');
        item.textContent = `${data.sender_name}: ${data.message}`;
        document.getElementById('messages').appendChild(item);
    });
</script>
</body>
</body>
</html>
