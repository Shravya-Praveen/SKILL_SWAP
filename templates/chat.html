<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>

    <div style="margin-top: 20px;">
        <a href="/" style="text-decoration: none;">⬅ Back to Dashboard</a>
        <h2>Chatting with: <span style="color: #28a745;">{{ receiver.name }}</span></h2>
        <p style="margin-top: -10px; color: gray;">Their Expertise: {{ receiver.skill_offer }}</p>
    </div>

    <div style="border: 1px solid #ccc; padding: 15px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px;">
        
        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold; display: block; margin-bottom: 5px;">Your Name:</label>
            <input type="text" id="senderName" value="{{ sender.name }}" readonly style="width: 100%; padding: 8px; background-color: #f0f0f0; color: #555;">
        </div>

        <div id="private-messages" style="height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 15px; background: #fafafa; border-radius: 4px; display: flex; flex-direction: column; gap: 5px;"></div>
        
        <div style="display: flex; gap: 10px;">
            <input type="text" id="chatMessage" placeholder="Write a message..." style="flex-grow: 1; padding: 8px;">
            <button id="sendButton" style="background-color: #28a745; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer;">Send</button>
        </div>
    </div>

    <script src="https://cdn.socketio.org/4.7.5/socketio.min.js"></script>
    <script>
        const socket = io({
            transports: ['websocket', 'polling']
        });

        const sId = parseInt("{{ sender.id }}");
        const rId = parseInt("{{ receiver.id }}");
        const roomName = sId < rId ? `room_${sId}_${rId}` : `room_${rId}_${sId}`;

        socket.emit('join', { room: roomName });

        const msgDiv = document.getElementById('private-messages');
        const inputMsg = document.getElementById('chatMessage');
        const inputSender = document.getElementById('senderName');
        const sendBtn = document.getElementById('sendButton');

        socket.on('new_message', function(msg) {
            const row = document.createElement('div');
            row.style.padding = '8px';
            row.style.background = '#eef9f1';
            row.style.borderRadius = '4px';
            row.style.maxWidth = '85%';
            row.style.wordBreak = 'break-word';
            row.innerHTML = msg;
            
            msgDiv.appendChild(row);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });

        function transmitMessage() {
            const text = inputMsg.value.trim();
            if (text !== "") {
                socket.emit('private_message', {
                    room: roomName,
                    sender: inputSender.value,
                    message: text
                });
                inputMsg.value = '';
                inputMsg.focus();
            }
        }

        sendBtn.addEventListener('click', function(e) {
            e.preventDefault();
            transmitMessage();
        });

        inputMsg.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                transmitMessage();
            }
        });
    </script>
</body>
</html>
