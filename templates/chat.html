<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatting with {{ target_user.name }}</title>
    <!-- Tailwind CSS CDN for quick clean formatting -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Socket.io client dependency -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socketio/4.7.5/socketio.min.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="max-w-2xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
        <div class="flex justify-between items-center border-b pb-4 mb-4">
            <div>
                <a href="/" class="text-blue-500 hover:underline text-sm">&larr; Back to Dashboard</a>
                <h1 class="text-2xl font-bold text-gray-800">Chatting with: <span class="text-green-600">{{ target_user.name }}</span></h1>
                <p class="text-gray-500 text-sm">Their Expertise: {{ target_user.offering }}</p>
            </div>
        </div>

        <!-- Name Selection Row -->
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Your Name:</label>
            <input id="sender_name" type="text" placeholder="Enter your name to start chatting..." class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
        </div>

        <!-- Message Box Containers -->
        <div id="chat_window" class="h-64 border rounded-md p-4 bg-gray-50 overflow-y-auto mb-4 flex flex-col gap-2">
            <!-- Dynamic Messages Go Here -->
        </div>

        <!-- Text Input Bar -->
        <div class="flex gap-2">
            <input id="message_input" type="text" placeholder="Write a message..." class="flex-1 px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
            <button id="send_btn" class="bg-green-600 text-white px-6 py-2 rounded-md hover:bg-green-700 transition">Send</button>
        </div>
    </div>

    <script>
        // Connect to SocketIO automatically pointing to host domain
        const socket = io();

        // Assigning simple deterministic room identifiers.
        // For real setups you might want unique IDs, but a simple room string handles testing nicely.
        const currentUserId = "{{ target_user.id }}";
        const chatRoom = `room_user_${currentUserId}`;

        // Connect and join the chat room context
        socket.on('connect', () => {
            socket.emit('join', { room: chatRoom });
        });

        const chatWindow = document.getElementById('chat_window');
        const messageInput = document.getElementById('message_input');
        const senderNameInput = document.getElementById('sender_name');
        const sendBtn = document.getElementById('send_btn');

        // Function to render text on screen
        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = "p-2 rounded-lg max-w-xs " + 
                              (sender === senderNameInput.value ? "bg-green-100 self-end text-right" : "bg-blue-100 self-start text-left");
            
            msgDiv.innerHTML = `<strong class="block text-xs text-gray-600">${sender}</strong><span>${text}</span>`;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight; // Auto Scroll Down
        }

        // Listen for message broadcasts from backend
        socket.on('message_response', (data) => {
            appendMessage(data.sender, data.content);
        });

        // Trigger message submission
        function sendMessage() {
            const sender = senderNameInput.value.trim();
            const message = messageInput.value.trim();

            if (!sender) {
                alert("Please fill in your name first to send a message!");
                return;
            }
            if (!message) return;

            socket.emit('send_message', {
                room: chatRoom,
                sender: sender,
                content: message
            });

            messageInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
