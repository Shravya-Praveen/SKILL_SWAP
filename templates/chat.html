<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with {{ target_user.name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@example/water.css@2/out/water.css">
    <script src="https://cdn.socketio.org/4.7.2/socket.io.min.js"></script>
    <style>
        body { max-width: 600px; margin: 0 auto; padding: 20px; }
        #chat-window { border: 1px solid #ccc; height: 350px; overflow-y: scroll; padding: 15px; border-radius: 6px; background: #fdfdfd; margin-bottom: 15px; }
        .message { margin-bottom: 10px; padding: 8px 12px; border-radius: 6px; max-width: 75%; clear: both; }
        .msg-received { background-color: #e9ecef; float: left; }
        .msg-sent { background-color: #d4edda; float: right; color: #155724; }
        .input-area { display: flex; gap: 10px; }
        #message-input { flex-grow: 1; padding: 8px; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Chatting with {{ target_user.name }}</h2>
        <a href="/" style="text-decoration: none;">← Back to Dashboard</a>
    </div>
    <p style="color: #666; margin-top: -10px;">Expertise: {{ target_user.offering }}</p>

    <div id="chat-window"></div>

    <div class="input-area">
        <input type="text" id="username-input" placeholder="Your Name" style="width: 120px; padding: 8px;">
        <input type="text" id="message-input" placeholder="Write a message...">
        <button id="send-btn">Send</button>
    </div>

    <script>
        // Connect automatically according to server address
        const socket = io();

        const chatWindow = document.getElementById('chat-window');
        const usernameInput = document.getElementById('username-input');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // Listen for message events coming from backend
        socket.on('receive_message', function(data) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            
            // Check if user sent it or someone else did
            const currentUsername = usernameInput.value.trim();
            if (currentUsername && data.sender === currentUsername) {
                msgDiv.classList.add('msg-sent');
            } else {
                msgDiv.classList.add('msg-received');
            }

            msgDiv.innerHTML = `<strong>${data.sender}:</strong> ${data.message}`;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight; // Auto Scroll Down
        });

        // Trigger message submission
        function sendMessage() {
            const senderName = usernameInput.value.trim() || "Anonymous";
            const messageText = messageInput.value.trim();

            if (messageText === "") return;

            socket.emit('send_message', {
                sender: senderName,
                message: messageText
            });

            messageInput.value = "";
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
