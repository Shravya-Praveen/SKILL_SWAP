<h2>Available Swappers</h2>

<div class="profiles-container">
    {% for profile in profiles %}
    <div class="profile-card" style="border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px;">
        <h3>{{ profile.name }}</h3>
        
        <p><strong>Offering:</strong> <span class="badge">{{ profile.skill_offer }}</span></p>
        
        <p><strong>Seeking:</strong> <span class="badge">{{ profile.skill_seek }}</span></p>
        
        <p>{{ profile.bio }}</p>
    </div>
    {% else %}
    <p>No swappers found matching your search criteria.</p>
    {% endfor %}
</div>
