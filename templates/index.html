<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .profiles-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .profile-card { border: 1px solid #e0e0e0; padding: 20px; border-radius: 8px; background: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .profile-card:hover { transform: translateY(-2px); }
        .badge { background-color: #007bff; color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.85em; display: inline-block; margin-left: 5px; }
        .badge-seek { background-color: #28a745; }
        #chat-container { border: 1px solid #ccc; padding: 15px; margin: 40px auto 20px auto; max-width: 500px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #messages { height: 200px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; background: #fafafa; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Skill Swap Community</h1>
        <a href="/register" class="button" style="text-decoration: none; padding: 10px 15px; background: #007bff; color: white; border-radius: 4px;">Join/Add Profile</a>
    </div>

    <form method="GET" action="/" style="display: flex; gap: 10px; margin-bottom: 30px;">
        <input type="text" name="search" placeholder="Search by name or skill..." value="{{ search_query }}" style="flex-grow: 1; padding: 8px;">
        <button type="submit">Search</button>
    </form>

    <h2>Available Swappers</h2>
    <div class="profiles-container">
        {% for profile in profiles %}
        <div class="profile-card">
            <h3 style="margin-top: 0; color: #007bff;">{{ profile.name }}</h3>
            <p><strong>Offering:</strong> <span class="badge">{{ profile.skill_offer }}</span></p>
            <p><strong>Seeking:</strong> <span class="badge badge-seek">{{ profile.skill_seek }}</span></p>
            <p style="color: #555; font-style: italic; margin-bottom: 0;">"{{ profile.bio }}"</p>
        </div>
        {% else %}
        <p>No swappers found matching your search criteria.</p>
        {% endfor %}
    </div>

    <div id="chat-container">
        <h3 style="margin-top: 0; color: #333;">Live Swap Chat</h3>
        <div id="messages"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="myMessage" placeholder="Type a message..." style="flex-grow: 1; padding: 8px;">
            <button id="sendButton" style="cursor: pointer;">Send</button>
        </div>
    </div>

    <script src="https://cdn.socketio.org/4.7.5/socketio.min.js"></script>
    <script>
        const socket = io();
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('myMessage');
        const sendBtn = document.getElementById('sendButton');

        socket.on('message', function(msg) {
            const msgElement = document.createElement('div');
            msgElement.style.padding = '5px 0';
            msgElement.style.borderBottom = '1px solid #f9f9f9';
            msgElement.innerHTML = msg;
            messagesDiv.appendChild(msgElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        sendBtn.addEventListener('click', function() {
            if (messageInput.value.trim() !== "") {
                socket.send(messageInput.value);
                messageInput.value = '';
            }
        });

        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
