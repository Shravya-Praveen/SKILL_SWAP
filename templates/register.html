<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; background-color: #f4f7f6; }
        form { background: white; padding: 3px 25px 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #48bb78; color: white; border: none; padding: 10px 15px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 1em; }
        a { display: block; text-align: center; margin-top: 15px; color: #2b6cb0; text-decoration: none; }
    </style>
</head>
<body>

    <form action="/register" method="POST">
        <h2>Create Your Swap Profile</h2>
        
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="skill_offer">Skill You Teach/Offer:</label>
            <input type="text" id="skill_offer" name="skill_offer" placeholder="e.g. Python, Cooking" required>
        </div>

        <div class="form-group">
            <label for="skill_seek">Skill You Want to Learn:</label>
            <input type="text" id="skill_seek" name="skill_seek" placeholder="e.g. UI/UX, Guitar" required>
        </div>

        <div class="form-group">
            <label for="bio">Short Bio:</label>
            <textarea id="bio" name="bio" rows="4" required></textarea>
        </div>

        <button type="submit">Publish Profile</button>
        <a href="/">Back to Browse</a>
    </form>

</body>
</html>
