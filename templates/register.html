<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Skill Swap Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="max-w-md mx-auto mt-12 p-8 bg-white rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Create Your Swapper Profile</h2>
        
        <form action="/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-medium mb-1">Your Name</label>
                <input type="text" name="name" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1">What Skill Are You Offering?</label>
                <input type="text" name="offering" placeholder="e.g., Videography, Dance" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1">What Skill Are You Seeking?</label>
                <input type="text" name="seeking" placeholder="e.g., Cooking, Python" required class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1">Short Bio</label>
                <textarea name="bio" placeholder="Tell others a bit about your background..." class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 h-24"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-md hover:bg-blue-700 transition">Save Profile</button>
        </form>
        
        <div class="text-center mt-4">
            <a href="/" class="text-sm text-gray-500 hover:underline">Cancel and go back</a>
        </div>
    </div>

</body>
</html>
