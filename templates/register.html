<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Skill Swap Community</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@example/water.css@2/out/water.css">
    <style>
        body { max-width: 600px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], textarea { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .back-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #666; }
    </style>
</head>
<body>

    <h2>Create Your Swapper Profile</h2>
    <form action="/register" method="POST">
        <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required placeholder="e.g., John Doe">
        </div>

        <div class="form-group">
            <label for="offering">What Skill Are You Offering?</label>
            <input type="text" id="offering" name="offering" required placeholder="e.g., Python Programming, Graphic Design">
        </div>

        <div class="form-group">
            <label for="seeking">What Skill Are You Seeking?</label>
            <input type="text" id="seeking" name="seeking" required placeholder="e.g., Spanish Speaking, Web Development">
        </div>

        <div class="form-group">
            <label for="bio">Short Bio</label>
            <textarea id="bio" name="bio" rows="4" placeholder="Tell others a bit about your background and goals..."></textarea>
        </div>

        <button type="submit">Save Profile</button>
    </form>

    <a href="/" class="back-link">← Cancel and go back</a>

</body>
</html>
